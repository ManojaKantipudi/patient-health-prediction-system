<!DOCTYPE html>
<html>

<head>
    <title>Add Patient</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h2 class="mb-4">Add Patient</h2>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Date of Birth</label>
                <input type="date" name="dob" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Glucose</label>
                <input type="number" step="0.01" name="glucose" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Haemoglobin</label>
                <input type="number" step="0.01" name="haemoglobin" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Cholesterol</label>
                <input type="number" step="0.01" name="cholesterol" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-success">
                Add Patient
            </button>

            <a href="/" class="btn btn-secondary">
                Back
            </a>

        </form>

    </div>

</body>

</html>
