<!DOCTYPE html>
<html>

<head>

    <title>Edit Patient</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <div class="container mt-5">

        <h2>Edit Patient</h2>

        <form method="POST">

            <div class="mb-3">
                <label>Name</label>
                <input type="text" name="name" class="form-control" value="{{ patient.full_name }}" required>
            </div>

            <div class="mb-3">
                <label>Date of Birth</label>
                <input type="date" name="dob" class="form-control" value="{{ patient.dob }}" required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" value="{{ patient.email }}" required>
            </div>

            <div class="mb-3">
                <label>Glucose</label>
                <input type="number" step="0.01" name="glucose" class="form-control" value="{{ patient.glucose }}"
                    required>
            </div>

            <div class="mb-3">
                <label>Haemoglobin</label>
                <input type="number" step="0.01" name="haemoglobin" class="form-control"
                    value="{{ patient.haemoglobin }}" required>
            </div>

            <div class="mb-3">
                <label>Cholesterol</label>
                <input type="number" step="0.01" name="cholesterol" class="form-control"
                    value="{{ patient.cholesterol }}" required>
            </div>

            <button class="btn btn-primary">
                Update Patient
            </button>

            <a href="/" class="btn btn-secondary">
                Back
            </a>

        </form>

    </div>

</body>

</html>
